name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

jobs:
  test:
    name: Swift test and bundle
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          swift --version
          swift format --version

      - name: Describe package
        run: swift package describe

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Bundle
        run: make bundle
